# Render.com 用（Blueprint）
# https://dashboard.render.com でこのリポジトリを接続してデプロイ

services:
  - type: web
    name: line-kameko-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: TZ
        value: Asia/Tokyo
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_GROUP_ID
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.5
